name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r lead_pipeline/requirements.txt
          pip install -r crawler/requirements.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy (lead_pipeline)
        run: mypy lead_pipeline

      - name: Pytest
        env:
          LEAD_PIPELINE_SECRET_KEY: test-secret-key-min-16-bytes-long-aaaa
        run: pytest -ra
