services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-email_grabber}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_locally}
      POSTGRES_DB: ${POSTGRES_DB:-email_grabber}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-email_grabber}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  lead_pipeline:
    build:
      context: .
      dockerfile: lead_pipeline/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-email_grabber}:${POSTGRES_PASSWORD:-change_me_locally}@db:5432/${POSTGRES_DB:-email_grabber}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  crawler:
    build:
      context: .
      dockerfile: crawler/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-email_grabber}:${POSTGRES_PASSWORD:-change_me_locally}@db:5432/${POSTGRES_DB:-email_grabber}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No default command — run via `docker compose run --rm crawler scrapy crawl market_intel -a start_url=...`
    command: ["sleep", "infinity"]

volumes:
  postgres-data:
